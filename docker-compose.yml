version: "3.9"

services:
  backend:
    container_name: impact10x-backend

    build:
      context: ./backend
      dockerfile: Dockerfile

    ports:
      - "8000:8000"

    environment:
      PORT: 8000

#    volumes:
#      - ~/tmp/backend:/app

    restart: unless-stopped

    networks:
      - impact10x-network

  frontend:
    container_name: impact10x-frontend

    build:
      context: ./frontend
      dockerfile: Dockerfile

    ports:
      - "5173:5173"

    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: http://backend:8000

#    volumes:
#      - ~/tmp/frontend:/app
##      - /app/node_modules

    depends_on:
      - backend

    restart: unless-stopped

    networks:
      - impact10x-network

networks:
  impact10x-network:
    driver: bridge